name: Test

on:
  push:
  pull_request:

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          bash -n scripts/init-agent-debate.sh
          bash -n scripts/test.sh
      - name: Run end-to-end test
        run: ./scripts/test.sh
